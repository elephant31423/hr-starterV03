server:
  port: 8082

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hrdb?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
  docker:
    compose:
      enabled: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
  redis:
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
    host: localhost
    port: 6379
    database: 0
shift:
  edit-buffer-days: 1

#mybatis:
#  mapper-locations: classpath:mapper/*.xml
#  type-aliases-package: com.example.hrstarter.entity
#  configuration:
##    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
#    map-underscore-to-camel-case: true

mybatis-plus:

  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.hrstarter.entity
  configuration:
    map-underscore-to-camel-case: true

  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: ""
      ddl-type: none

jwt:
  secret: MySecureJWTSecretKeyForHRSystemWithMinimum256Bits
  expiration-ms: 3600000
debug: false

