server:
  port: ${PORT:8082}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hrdb?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  docker:
    compose:
      enabled: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    baselineOnMigrate: true
  redis:
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms
    host: ${REDISHOST:localhost}
    port: ${REDISPORT:6379}
    password: ${REDISPASSWORD:}
    database: ${REDIS_DATABASE:0}
shift:
  edit-buffer-days: 1

#mybatis:
#  mapper-locations: classpath:mapper/*.xml
#  type-aliases-package: com.example.hrstarter.entity
#  configuration:
##    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
#    map-underscore-to-camel-case: true

mybatis-plus:

  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.hrstarter.entity
  configuration:
    map-underscore-to-camel-case: true

  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      table-prefix: ""
      ddl-type: none

jwt:
  secret: ${JWT_SECRET:MySecureJWTSecretKeyForHRSystemWithMinimum256Bits}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}
debug: false

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:5173,http://127.0.0.1:3000}

